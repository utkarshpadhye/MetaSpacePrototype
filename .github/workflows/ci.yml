name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: metaspace
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d metaspace"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/metaspace
      APP_ENV: ci
      APP_NAME: MetaSpace API CI
      CORS_ORIGINS: http://localhost:5173
      JWT_SECRET: ci-secret
      WS_ORIGIN: http://localhost:5173
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Migration check
        run: alembic upgrade head
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
